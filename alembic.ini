# Alembic configuration for TMvault.
#
# Migrations live in `alembic/versions/`. The first revision is a
# no-op baseline that stamps the current schema (which today is
# created by `Base.metadata.create_all` in shared/database.py).
#
# Running migrations
#   alembic upgrade head            # apply all pending
#   alembic current                  # show current revision
#   alembic history --verbose        # full history
#   alembic stamp head               # mark DB as up-to-date without
#                                    # running DDL (used to graft the
#                                    # baseline onto existing DBs)
#   alembic revision --autogenerate -m "describe change"
#                                    # diff models vs DB, write a
#                                    # candidate migration file
#
# The DSN is loaded by `alembic/env.py` from the running settings
# (so it picks up DATABASE_URL or DB_HOST/DB_USERNAME/...) — leaving
# `sqlalchemy.url` here BLANK is intentional and required.

[alembic]
script_location = alembic
sqlalchemy.url =

# Don't use timezone-shifted datetimes in the file_template; UTC is
# simpler to reason about when reviewing the version directory.
file_template = %%(year)d%%(month).2d%%(day).2d_%%(rev)s_%%(slug)s
timezone = UTC

# Show the SQL we'd emit before running it (very useful in prod).
truncate_slug_length = 40

[post_write_hooks]
# No formatter hooks — keep migrations clean by hand.

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
