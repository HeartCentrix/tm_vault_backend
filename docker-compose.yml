services:
  postgres:
    # Pinned by digest (D-H1). Floating `16-alpine` tag can be moved by
    # upstream between `docker compose pull` runs; the digest commits
    # the build to a specific bit-for-bit image. Refresh with:
    #   docker buildx imagetools inspect postgres:16-alpine --format '{{.Manifest.Digest}}'
    image: postgres:16-alpine@sha256:16bc17c64a573ef34162af9298258d1aec548232985b33ed7b1eac33ba35c229
    container_name: tm_vault_db
    env_file: .env
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    command: postgres -c max_connections=800 -c shared_buffers=512MB
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME}"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped
    networks:
      - tm-network

  rabbitmq:
    # Pinned by digest (D-H1). Refresh with:
    #   docker buildx imagetools inspect rabbitmq:3-management-alpine --format '{{.Manifest.Digest}}'
    image: rabbitmq:3-management-alpine@sha256:606d8c0d6b3c18d1da9afc53bc7cdb2a8d5486df91b5a9830e9e07626c9ae281
    container_name: tm_vault_rabbitmq
    environment:
      # No :- fallback. If RABBITMQ_USER/RABBITMQ_PASSWORD are missing the
      # compose stack must refuse to start rather than silently boot the
      # broker with the well-known guest:guest credential.
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:?RABBITMQ_USER must be set — do not fall back to the default guest account}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD:?RABBITMQ_PASSWORD must be set — do not fall back to the default guest account}
    # Config mounted from host - if mount fails, comment out and use defaults:
    # volumes:
    #   - ./rabbitmq.conf:/etc/rabbitmq/rabbitmq.conf:ro
    ports:
      # AMQP and management UI are bound to loopback only. Other services
      # in the compose network reach RabbitMQ via the service DNS name
      # (`rabbitmq:5672`) on the internal bridge — they do not need the
      # host port forwarded. Exposing 0.0.0.0:15672 lets any host on the
      # LAN/internet hit the management UI and (with default creds) take
      # over the broker — see D-C3. For remote admin access, tunnel via
      # SSH or VPN.
      - "127.0.0.1:5672:5672"
      - "127.0.0.1:15672:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - tm-network

  redis:
    # Pinned by digest (D-H1). Refresh with:
    #   docker buildx imagetools inspect redis:7-alpine --format '{{.Manifest.Digest}}'
    image: redis:7-alpine@sha256:6ab0b6e7381779332f97b8ca76193e45b0756f38d4c0dcda72dbb3c32061ab99
    container_name: tm_vault_redis
    # `--requirepass` makes auth mandatory on every connection — without
    # this any pod on the same network could read/write the revocation
    # denylist and rate-limit buckets unauthenticated. `${REDIS_PASSWORD:?…}`
    # forces the compose stack to fail-fast if the operator forgot to
    # provision a password in .env, matching the RabbitMQ pattern above.
    command: >-
      redis-server --appendonly yes
      --requirepass "${REDIS_PASSWORD:?REDIS_PASSWORD must be set — Redis must not run unauthenticated}"
    environment:
      # Pass the password through so the in-container healthcheck below
      # can authenticate. (Compose interpolates ${…} at file-parse time
      # before any container exists.)
      REDIS_PASSWORD: ${REDIS_PASSWORD:?REDIS_PASSWORD must be set — Redis must not run unauthenticated}
    ports:
      # Bind to loopback only (D-C3). Other compose services reach Redis
      # via the service DNS name `redis:6379` on the internal bridge —
      # they do not need the host port forwarded, and exposing 0.0.0.0
      # is a fast way to ship an unauthenticated key/value store to any
      # host on the LAN/internet.
      - "127.0.0.1:6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a \"$$REDIS_PASSWORD\" ping | grep PONG"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped
    networks:
      - tm-network

  # Azurite — local Azure Storage emulator used for unit-integration tests.
  # Started only under the `test` profile: `docker-compose --profile test up -d azurite`.
  # Prod tests run against real Azure via AZURE_TEST_CONNECTION_STRING env var.
  # One op (stage_block_from_url) is not implemented by Azurite 3.29.0 — the
  # corresponding test is skipped when the connection string points to Azurite.
  azurite:
    # TODO(D-H1): pin by digest. MCR's manifest endpoint returns the v1
    # schema (no inline digest); fetch via the Docker CLI on a host with
    # network access:
    #   docker pull mcr.microsoft.com/azure-storage/azurite:3.29.0
    #   docker inspect --format='{{index .RepoDigests 0}}' mcr.microsoft.com/azure-storage/azurite:3.29.0
    # Test-only profile, so the supply-chain blast radius is smaller than
    # the other services — but still worth pinning.
    image: mcr.microsoft.com/azure-storage/azurite:3.29.0
    container_name: tm_vault_azurite
    command: "azurite-blob --blobHost 0.0.0.0 --loose --skipApiVersionCheck"
    ports:
      - "10000:10000"
    volumes:
      - azurite_data:/data
    profiles:
      - test
    restart: unless-stopped

  # SeaweedFS — local S3-compatible object store used as the primary
  # on-device storage backend. Always started. Data lives on the host at
  # ${SEAWEEDFS_DATA_DIR:-D:/tm_vault_data/seaweedfs} so it survives
  # `docker compose down`. Credentials come from deploy/local/seaweedfs-s3.json.
  seaweedfs:
    # Pinned by digest (D-C1 / D-H1). Refresh with:
    #   docker buildx imagetools inspect chrislusf/seaweedfs:3.71 --format '{{.Manifest.Digest}}'
    # A floating tag can be force-pushed by the upstream maintainer;
    # only a digest commits the build to a specific bit-for-bit image.
    image: chrislusf/seaweedfs:3.71@sha256:c47aadbe7b6f78ff52e03bd0a27c6f61c2b27640cba3cf1215cbcafd9045122f
    container_name: tm_vault_seaweedfs
    # Drop privileges (D-C2). SeaweedFS does not need root; binding to
    # high ports (8333/9333) and writing to /data works fine as UID 10001.
    # On Linux hosts you must pre-chown the bind-mount target so the
    # container can write to it:
    #   chown -R 10001:10001 ${SEAWEEDFS_DATA_DIR:-/var/tm_vault_data/seaweedfs}
    # On Docker Desktop (Windows/macOS) the bind-mount file-sharing layer
    # already presents the host directory as writable to any UID.
    user: "10001:10001"
    command:
      - "server"
      - "-dir=/data"
      - "-ip=0.0.0.0"
      - "-s3"
      - "-s3.config=/config/s3.json"
      - "-filer"
      - "-master.volumeSizeLimitMB=256"
      - "-volume.max=0"
      - "-volume.preStopSeconds=1"
      - "-master.volumePreallocate=false"
    volumes:
      - ./deploy/local/seaweedfs-s3.json:/config/s3.json:ro
      - ${SEAWEEDFS_DATA_DIR:-D:/tm_vault_data/seaweedfs}:/data
    ports:
      - "8333:8333"
      - "9333:9333"
    restart: unless-stopped
    networks:
      - tm-network

  api-gateway:
    build:
      context: .
      dockerfile: api-gateway/Dockerfile
    container_name: tm_vault_gateway
    env_file: .env
    environment:
      DB_HOST: postgres
      JWT_SECRET: ${JWT_SECRET}
      CORS_ORIGINS: ${CORS_ALLOWED_ORIGINS}
    ports:
      - "8080:8000"
    depends_on:
      postgres:
        condition: service_healthy
    # D-H3: HTTP liveness probe so dependent services' `condition:
    # service_healthy` actually waits for an answering process, not just
    # a started container. urllib instead of curl because the python:alpine
    # base image doesn't ship curl.
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health', timeout=5)"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 30s
    restart: unless-stopped
    networks:
      - tm-network

  auth-service:
    build:
      context: .
      dockerfile: services/auth-service/Dockerfile
    container_name: tm_vault_auth
    env_file: .env
    environment:
      DB_HOST: postgres
      JWT_SECRET: ${JWT_SECRET}
      # Required for at-rest encryption of OAuth access/refresh tokens
      # (Power BI, M365 datasource consents). Must be a base64 Fernet key
      # distinct from JWT_SECRET. Provisioned in .env.
      ENCRYPTION_KEY: ${ENCRYPTION_KEY:-}
      # Short access-token TTL; SPA auto-refresh hides the boundary.
      JWT_EXPIRATION_HOURS: ${JWT_EXPIRATION_HOURS:-1}
      JWT_REFRESH_EXPIRATION_DAYS: ${JWT_REFRESH_EXPIRATION_DAYS:-7}
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8001/health', timeout=5)"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 30s
    restart: unless-stopped
    networks:
      - tm-network

  tenant-service:
    build:
      context: .
      dockerfile: services/tenant-service/Dockerfile
    container_name: tm_vault_tenant
    env_file: .env
    environment:
      DB_HOST: postgres
      # Manual discovery triggered from Protection/Tenant pages runs
      # here too — needs cert access for the SharePoint admin API.
      # Cert shipped via SHAREPOINT_CERT_PEM_B64 env var (graph_client
      # reads that first, then falls back to disk). Avoids Docker Desktop
      # WSL "mkdir /run/desktop/mnt/host/d: file exists" glitch that
      # used to block this container from starting.
      SHAREPOINT_CERT_PEM_B64: ${SHAREPOINT_CERT_PEM_B64:-}
      SHAREPOINT_CERT_THUMBPRINT: ${SHAREPOINT_CERT_THUMBPRINT:-}
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8002/health', timeout=5)"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 30s
    restart: unless-stopped
    networks:
      - tm-network

  resource-service:
    build:
      context: .
      dockerfile: services/resource-service/Dockerfile
    container_name: tm_vault_resource
    env_file: .env
    environment:
      DB_HOST: postgres
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8003/health', timeout=5)"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 30s
    restart: unless-stopped
    networks:
      - tm-network

  job-service:
    build:
      context: .
      dockerfile: services/job-service/Dockerfile
    container_name: tm_vault_job
    env_file: .env
    environment:
      DB_HOST: postgres
      RABBITMQ_ENABLED: "true"
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USER: ${RABBITMQ_USER:?RABBITMQ_USER must be set — do not fall back to the default guest account}
      RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD:?RABBITMQ_PASSWORD must be set — do not fall back to the default guest account}
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8004/health', timeout=5)"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 30s
    restart: unless-stopped
    networks:
      - tm-network

  snapshot-service:
    build:
      context: .
      dockerfile: services/snapshot-service/Dockerfile
    container_name: tm_vault_snapshot
    env_file: .env
    environment:
      DB_HOST: postgres
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8005/health', timeout=5)"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 30s
    restart: unless-stopped
    networks:
      - tm-network

  dashboard-service:
    build:
      context: .
      dockerfile: services/dashboard-service/Dockerfile
    container_name: tm_vault_dashboard
    env_file: .env
    environment:
      DB_HOST: postgres
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8006/health', timeout=5)"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 30s
    restart: unless-stopped
    networks:
      - tm-network

  alert-service:
    build:
      context: .
      dockerfile: services/alert-service/Dockerfile
    container_name: tm_vault_alert
    env_file: .env
    environment:
      DB_HOST: postgres
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8007/health', timeout=5)"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 30s
    restart: unless-stopped
    networks:
      - tm-network

  discovery-worker:
    build:
      context: .
      dockerfile: workers/discovery-worker/Dockerfile
    container_name: tm_vault_discovery
    env_file: .env
    environment:
      DB_HOST: postgres
      RABBITMQ_ENABLED: ${RABBITMQ_ENABLED:-false}
      RABBITMQ_HOST: ${RABBITMQ_HOST:-rabbitmq}
      RABBITMQ_PORT: ${RABBITMQ_PORT:-5672}
      RABBITMQ_USER: ${RABBITMQ_USER:?RABBITMQ_USER must be set — do not fall back to the default guest account}
      RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD:?RABBITMQ_PASSWORD must be set — do not fall back to the default guest account}
      # SharePoint admin API requires a cert-signed JWT. Same setup as
      # backup-worker — see secrets/sharepoint_auth.pem.
      # Cert shipped via SHAREPOINT_CERT_PEM_B64 env var (graph_client
      # reads that first, then falls back to disk). Avoids Docker Desktop
      # WSL "mkdir /run/desktop/mnt/host/d: file exists" glitch that
      # used to block this container from starting.
      SHAREPOINT_CERT_PEM_B64: ${SHAREPOINT_CERT_PEM_B64:-}
      SHAREPOINT_CERT_THUMBPRINT: ${SHAREPOINT_CERT_THUMBPRINT:-}
    depends_on:
      postgres:
        condition: service_healthy
    # TODO(D-H3): discovery-worker is a pure RabbitMQ consumer with no
    # HTTP server. Add a /health endpoint to its main loop (mirror
    # chat-export-worker.health_server) so a deadlocked consumer is
    # actually detectable instead of just "container is up".
    restart: unless-stopped
    networks:
      - tm-network

  # ===== Mass Backup Services =====
  
  backup-scheduler:
    build:
      context: .
      dockerfile: services/backup-scheduler/Dockerfile
    container_name: tm_vault_backup_scheduler
    env_file: .env
    environment:
      DB_HOST: postgres
      RABBITMQ_ENABLED: "true"
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USER: ${RABBITMQ_USER:?RABBITMQ_USER must be set — do not fall back to the default guest account}
      RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD:?RABBITMQ_PASSWORD must be set — do not fall back to the default guest account}
      REDIS_ENABLED: "true"
      REDIS_HOST: redis
      REDIS_PORT: 6379
    ports:
      - "8008:8008"
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8008/health', timeout=5)"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 30s
    restart: unless-stopped
    networks:
      - tm-network

  report-service:
    build:
      context: .
      dockerfile: services/report-service/Dockerfile
    container_name: tm_vault_report_service
    env_file: .env
    environment:
      DB_HOST: postgres
    ports:
      - "8014:8014"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8014/health', timeout=5)"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 30s
    restart: unless-stopped
    networks:
      - tm-network

  backup-worker:
    build:
      context: .
      dockerfile: workers/backup-worker/Dockerfile
    env_file: .env
    environment:
      PYTHONUNBUFFERED: "1"
      DB_HOST: postgres
      RABBITMQ_ENABLED: "true"
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USER: ${RABBITMQ_USER:?RABBITMQ_USER must be set — do not fall back to the default guest account}
      RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD:?RABBITMQ_PASSWORD must be set — do not fall back to the default guest account}
      REDIS_ENABLED: "true"
      REDIS_HOST: redis
      REDIS_PORT: 6379
      AZURE_STORAGE_ACCOUNT_NAME: ${AZURE_STORAGE_ACCOUNT_NAME}
      AZURE_STORAGE_ACCOUNT_KEY: ${AZURE_STORAGE_ACCOUNT_KEY}
      # Multi-app registration
      APP_1_CLIENT_ID: ${APP_1_CLIENT_ID}
      APP_1_CLIENT_SECRET: ${APP_1_CLIENT_SECRET}
      APP_1_TENANT_ID: ${APP_1_TENANT_ID}
      APP_2_CLIENT_ID: ${APP_2_CLIENT_ID:-}
      APP_2_CLIENT_SECRET: ${APP_2_CLIENT_SECRET:-}
      APP_2_TENANT_ID: ${APP_2_TENANT_ID:-}
      APP_3_CLIENT_ID: ${APP_3_CLIENT_ID:-}
      APP_3_CLIENT_SECRET: ${APP_3_CLIENT_SECRET:-}
      APP_3_TENANT_ID: ${APP_3_TENANT_ID:-}
      AZURE_AD_CLIENT_ID: ${AZURE_AD_CLIENT_ID}
      AZURE_AD_CLIENT_SECRET: ${AZURE_AD_CLIENT_SECRET}
      # Cert-based auth for SharePoint REST. Optional — falls back to
      # the client-secret path when unset (Graph works, SP REST 401s
      # with "Unsupported app only token"). See
      # scripts/generate_sharepoint_cert.py + secrets/.
      # Cert shipped via SHAREPOINT_CERT_PEM_B64 env var (graph_client
      # reads that first, then falls back to disk). The bind-mount was
      # dropped because Docker Desktop on Windows intermittently errors
      # with "mkdir /run/desktop/mnt/host/d: file exists" when the WSL
      # distro reloads, blocking every worker container from starting.
      SHAREPOINT_CERT_PEM_B64: ${SHAREPOINT_CERT_PEM_B64:-}
      SHAREPOINT_CERT_THUMBPRINT: ${SHAREPOINT_CERT_THUMBPRINT:-}
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - tm-network
    deploy:
      # Production sizing for 250 TiB / 5K-user workloads:
      #   replicas: 20  (override via BACKUP_WORKER_REPLICAS)
      #   memory:   8 GiB / 4 GiB reserved
      # The worker's internal asyncio.Semaphore (BACKUP_CONCURRENCY=100)
      # fans out items per process; replicas multiply Graph throughput.
      # Multi-app rotation across APP_{1..N}_CLIENT_ID spreads load across
      # multiple Microsoft Graph apps to avoid per-app throttling.
      replicas: ${BACKUP_WORKER_REPLICAS:-1}
      resources:
        limits:
          memory: ${BACKUP_WORKER_MEM_LIMIT:-8G}
          cpus: "${BACKUP_WORKER_CPU_LIMIT:-4}"
        reservations:
          memory: ${BACKUP_WORKER_MEM_RESERVE:-2G}
    mem_limit: ${BACKUP_WORKER_MEM_LIMIT:-8g}

  # Heavy-pool backup worker for oversized OneDrive drives (>100 GB default
  # via BACKUP_HEAVY_THRESHOLD_BYTES). Consumes backup.heavy so regular
  # backup-worker replicas aren't blocked for hours by a single monster drive.
  # Gated by the 'heavy' compose profile — prod brings it up with
  # `docker-compose --profile heavy up -d`; local dev leaves it idle.
  backup-worker-heavy:
    build:
      context: .
      dockerfile: workers/backup-worker/Dockerfile
    container_name: tm_vault_backup_worker_heavy
    env_file: .env
    environment:
      PYTHONUNBUFFERED: "1"
      DB_HOST: postgres
      RABBITMQ_ENABLED: "true"
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USER: ${RABBITMQ_USER:?RABBITMQ_USER must be set — do not fall back to the default guest account}
      RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD:?RABBITMQ_PASSWORD must be set — do not fall back to the default guest account}
      REDIS_ENABLED: "true"
      REDIS_HOST: redis
      REDIS_PORT: 6379
      AZURE_STORAGE_ACCOUNT_NAME: ${AZURE_STORAGE_ACCOUNT_NAME}
      AZURE_STORAGE_ACCOUNT_KEY: ${AZURE_STORAGE_ACCOUNT_KEY}
      APP_1_CLIENT_ID: ${APP_1_CLIENT_ID}
      APP_1_CLIENT_SECRET: ${APP_1_CLIENT_SECRET}
      APP_1_TENANT_ID: ${APP_1_TENANT_ID}
      APP_2_CLIENT_ID: ${APP_2_CLIENT_ID:-}
      APP_2_CLIENT_SECRET: ${APP_2_CLIENT_SECRET:-}
      APP_2_TENANT_ID: ${APP_2_TENANT_ID:-}
      APP_3_CLIENT_ID: ${APP_3_CLIENT_ID:-}
      APP_3_CLIENT_SECRET: ${APP_3_CLIENT_SECRET:-}
      APP_3_TENANT_ID: ${APP_3_TENANT_ID:-}
      AZURE_AD_CLIENT_ID: ${AZURE_AD_CLIENT_ID}
      AZURE_AD_CLIENT_SECRET: ${AZURE_AD_CLIENT_SECRET}
      # Cert via env var — drops the /app/secrets bind-mount that was
      # hitting Docker Desktop's WSL mkdir glitch.
      SHAREPOINT_CERT_PEM_B64: ${SHAREPOINT_CERT_PEM_B64:-}
      SHAREPOINT_CERT_THUMBPRINT: ${SHAREPOINT_CERT_THUMBPRINT:-}
      # Heavy-pool knobs.
      BACKUP_WORKER_QUEUE: backup.heavy
      MAX_CONCURRENT_ONEDRIVE_BACKUPS_PER_WORKER: "1"
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_healthy
    deploy:
      # Production sizing for 250 TiB / 5K-user workloads:
      #   replicas: 5  (override via BACKUP_HEAVY_REPLICAS)
      #   memory:   32 GiB — accommodates whale drives (200GB+ OneDrive)
      # MAX_CONCURRENT_ONEDRIVE_BACKUPS_PER_WORKER=1 so each replica
      # processes one whale at a time; 5 replicas = 5 simultaneous whales.
      replicas: ${BACKUP_HEAVY_REPLICAS:-1}
      resources:
        limits:
          memory: ${BACKUP_HEAVY_MEM_LIMIT:-32G}
          cpus: "${BACKUP_HEAVY_CPU_LIMIT:-8}"
        reservations:
          memory: ${BACKUP_HEAVY_MEM_RESERVE:-8G}
    mem_limit: ${BACKUP_HEAVY_MEM_LIMIT:-32g}
    restart: unless-stopped
    networks:
      - tm-network

  chat-export-worker:
    build:
      context: .
      dockerfile: workers/chat-export-worker/Dockerfile
    container_name: tm_vault_chat_export_worker
    env_file: .env
    environment:
      PYTHONUNBUFFERED: "1"
      DB_HOST: postgres
      RABBITMQ_ENABLED: "true"
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USER: ${RABBITMQ_USER:?RABBITMQ_USER must be set — do not fall back to the default guest account}
      RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD:?RABBITMQ_PASSWORD must be set — do not fall back to the default guest account}
      REDIS_ENABLED: "true"
      REDIS_HOST: redis
      REDIS_PORT: 6379
      AZURE_STORAGE_ACCOUNT_NAME: ${AZURE_STORAGE_ACCOUNT_NAME}
      AZURE_STORAGE_ACCOUNT_KEY: ${AZURE_STORAGE_ACCOUNT_KEY}
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_healthy
    # chat-export-worker exposes its health server on 8081 (see main.py
    # `health_server`). Adds a probe so a stuck consumer doesn't hide
    # behind "container is running" indefinitely.
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8081/health', timeout=5)"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 30s
    restart: unless-stopped
    networks:
      - tm-network
    ports:
      - "9102:9102"
      - "8081:8081"
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 4G
        reservations:
          cpus: "0.5"
          memory: 1G

  # graph-proxy, delta-token, search-service: retired as of the services audit.
  # - graph-proxy: zero callers; GraphClient talks to Microsoft Graph directly
  # - delta-token: zero callers; delta tokens live on snapshots.delta_token column
  # - search-service: gateway routes /resources/search to resource-service (not this)
  # Source trees remain under services/ for reference. Re-add to compose only if
  # a caller appears. This saves ~240 MB RAM and several seconds on compose boot.

  progress-tracker:
    build:
      context: .
      dockerfile: services/progress-tracker/Dockerfile
    container_name: tm_vault_progress_tracker
    env_file: .env
    environment:
      DB_HOST: postgres
      RABBITMQ_ENABLED: "true"
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USER: ${RABBITMQ_USER:?RABBITMQ_USER must be set — do not fall back to the default guest account}
      RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD:?RABBITMQ_PASSWORD must be set — do not fall back to the default guest account}
    ports:
      - "8011:8011"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8011/health', timeout=5)"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 30s
    restart: unless-stopped
    networks:
      - tm-network

  audit-service:
    build:
      context: .
      dockerfile: services/audit-service/Dockerfile
    container_name: tm_vault_audit
    env_file: .env
    environment:
      DB_HOST: postgres
    ports:
      - "8012:8012"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8012/health', timeout=5)"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 30s
    restart: unless-stopped
    networks:
      - tm-network

  restore-worker:
    platform: linux/amd64
    build:
      context: .
      dockerfile: workers/restore-worker/Dockerfile
    env_file: .env
    environment:
      PYTHONUNBUFFERED: "1"
      DB_HOST: postgres
      RABBITMQ_ENABLED: "true"
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USER: ${RABBITMQ_USER:?RABBITMQ_USER must be set — do not fall back to the default guest account}
      RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD:?RABBITMQ_PASSWORD must be set — do not fall back to the default guest account}
      AZURE_STORAGE_ACCOUNT_NAME: ${AZURE_STORAGE_ACCOUNT_NAME}
      AZURE_STORAGE_ACCOUNT_KEY: ${AZURE_STORAGE_ACCOUNT_KEY}
      # Multi-app registration
      APP_1_CLIENT_ID: ${APP_1_CLIENT_ID}
      APP_1_CLIENT_SECRET: ${APP_1_CLIENT_SECRET}
      APP_1_TENANT_ID: ${APP_1_TENANT_ID}
      APP_2_CLIENT_ID: ${APP_2_CLIENT_ID:-}
      APP_2_CLIENT_SECRET: ${APP_2_CLIENT_SECRET:-}
      APP_2_TENANT_ID: ${APP_2_TENANT_ID:-}
      APP_3_CLIENT_ID: ${APP_3_CLIENT_ID:-}
      APP_3_CLIENT_SECRET: ${APP_3_CLIENT_SECRET:-}
      APP_3_TENANT_ID: ${APP_3_TENANT_ID:-}
      AZURE_AD_CLIENT_ID: ${AZURE_AD_CLIENT_ID}
      AZURE_AD_CLIENT_SECRET: ${AZURE_AD_CLIENT_SECRET}
      # PST export — production tunables (override per workload)
      PST_WRITE_CONCURRENCY: ${PST_WRITE_CONCURRENCY:-1}
      PST_DISK_OVERHEAD_MULTIPLIER: ${PST_DISK_OVERHEAD_MULTIPLIER:-2.0}
      PST_DISK_FLOOR_BYTES: ${PST_DISK_FLOOR_BYTES:-268435456}
      PST_MEMORY_LIMIT_MB: ${PST_MEMORY_LIMIT_MB:-0}
      PST_MEMORY_CHECK_INTERVAL: ${PST_MEMORY_CHECK_INTERVAL:-50}
      PST_GROUP_TIMEOUT_S: ${PST_GROUP_TIMEOUT_S:-7200}
      PST_ITEM_RETRY_MAX: ${PST_ITEM_RETRY_MAX:-3}
      PST_ITEM_RETRY_BACKOFF_BASE: ${PST_ITEM_RETRY_BACKOFF_BASE:-0.5}
      PST_MAX_ATTACHMENT_BYTES: ${PST_MAX_ATTACHMENT_BYTES:-52428800}
      # PST streaming mode tunables — bound memory regardless of mailbox size
      PST_FETCH_BATCH_SIZE: ${PST_FETCH_BATCH_SIZE:-1000}
      PST_GROUP_FLUSH_AT: ${PST_GROUP_FLUSH_AT:-1000}
      PST_TOTAL_ACCUMULATED_CAP: ${PST_TOTAL_ACCUMULATED_CAP:-5000}
      PST_AUTO_FOLDER_THRESHOLD: ${PST_AUTO_FOLDER_THRESHOLD:-5000}
      # Rate limiting: scope=user (default) caps concurrency per
      # mailbox/user — right for both single-tenant SaaS with many
      # users and multi-tenant. scope=tenant caps per organisation.
      # scope=disabled turns off limiting.
      PST_RATE_LIMIT_SCOPE: ${PST_RATE_LIMIT_SCOPE:-user}
      PST_RATE_LIMIT_PER_KEY: ${PST_RATE_LIMIT_PER_KEY:-3}
      PST_CANCEL_CHECK_INTERVAL: ${PST_CANCEL_CHECK_INTERVAL:-10}
      PST_ZIP_BLOCK_SIZE: ${PST_ZIP_BLOCK_SIZE:-4194304}
      PST_METRICS_PORT: ${PST_METRICS_PORT:-9100}
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - tm-network
    mem_limit: ${RESTORE_WORKER_MEM_LIMIT:-8g}
    deploy:
      # Production sizing for 250 TiB / 5K-user workloads:
      #   replicas: 12  (override via RESTORE_WORKER_REPLICAS)
      #   memory:   8 GiB — handles concurrent small/medium PST exports.
      # PST jobs ≥HEAVY_EXPORT_THRESHOLD_BYTES route to restore-worker-heavy.
      replicas: ${RESTORE_WORKER_REPLICAS:-2}
      resources:
        limits:
          memory: ${RESTORE_WORKER_MEM_LIMIT:-8G}
          cpus: "${RESTORE_WORKER_CPU_LIMIT:-2}"
        reservations:
          memory: ${RESTORE_WORKER_MEM_RESERVE:-1G}

  restore-worker-heavy:
    platform: linux/amd64
    build:
      context: .
      dockerfile: workers/restore-worker/Dockerfile
    container_name: tm_vault_restore_worker_heavy
    env_file: .env
    environment:
      PYTHONUNBUFFERED: "1"
      DB_HOST: postgres
      RABBITMQ_ENABLED: "true"
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USER: ${RABBITMQ_USER:?RABBITMQ_USER must be set — do not fall back to the default guest account}
      RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD:?RABBITMQ_PASSWORD must be set — do not fall back to the default guest account}
      AZURE_STORAGE_ACCOUNT_NAME: ${AZURE_STORAGE_ACCOUNT_NAME}
      AZURE_STORAGE_ACCOUNT_KEY: ${AZURE_STORAGE_ACCOUNT_KEY}
      # Multi-app registration
      APP_1_CLIENT_ID: ${APP_1_CLIENT_ID}
      APP_1_CLIENT_SECRET: ${APP_1_CLIENT_SECRET}
      APP_1_TENANT_ID: ${APP_1_TENANT_ID}
      APP_2_CLIENT_ID: ${APP_2_CLIENT_ID:-}
      APP_2_CLIENT_SECRET: ${APP_2_CLIENT_SECRET:-}
      APP_2_TENANT_ID: ${APP_2_TENANT_ID:-}
      APP_3_CLIENT_ID: ${APP_3_CLIENT_ID:-}
      APP_3_CLIENT_SECRET: ${APP_3_CLIENT_SECRET:-}
      APP_3_TENANT_ID: ${APP_3_TENANT_ID:-}
      AZURE_AD_CLIENT_ID: ${AZURE_AD_CLIENT_ID}
      AZURE_AD_CLIENT_SECRET: ${AZURE_AD_CLIENT_SECRET}
      RESTORE_WORKER_QUEUE: restore.heavy
      MAX_CONCURRENT_EXPORTS_PER_WORKER: 1
      # PST export — production tunables (override per workload)
      PST_WRITE_CONCURRENCY: ${PST_WRITE_CONCURRENCY:-1}
      PST_DISK_OVERHEAD_MULTIPLIER: ${PST_DISK_OVERHEAD_MULTIPLIER:-2.0}
      PST_DISK_FLOOR_BYTES: ${PST_DISK_FLOOR_BYTES:-268435456}
      PST_MEMORY_LIMIT_MB: ${PST_MEMORY_LIMIT_MB:-0}
      PST_MEMORY_CHECK_INTERVAL: ${PST_MEMORY_CHECK_INTERVAL:-50}
      PST_GROUP_TIMEOUT_S: ${PST_GROUP_TIMEOUT_S:-7200}
      PST_ITEM_RETRY_MAX: ${PST_ITEM_RETRY_MAX:-3}
      PST_ITEM_RETRY_BACKOFF_BASE: ${PST_ITEM_RETRY_BACKOFF_BASE:-0.5}
      PST_MAX_ATTACHMENT_BYTES: ${PST_MAX_ATTACHMENT_BYTES:-52428800}
      # PST streaming mode tunables — bound memory regardless of mailbox size
      PST_FETCH_BATCH_SIZE: ${PST_FETCH_BATCH_SIZE:-1000}
      PST_GROUP_FLUSH_AT: ${PST_GROUP_FLUSH_AT:-1000}
      PST_TOTAL_ACCUMULATED_CAP: ${PST_TOTAL_ACCUMULATED_CAP:-5000}
      PST_AUTO_FOLDER_THRESHOLD: ${PST_AUTO_FOLDER_THRESHOLD:-5000}
      # Rate limiting: scope=user (default) caps concurrency per
      # mailbox/user — right for both single-tenant SaaS with many
      # users and multi-tenant. scope=tenant caps per organisation.
      # scope=disabled turns off limiting.
      PST_RATE_LIMIT_SCOPE: ${PST_RATE_LIMIT_SCOPE:-user}
      PST_RATE_LIMIT_PER_KEY: ${PST_RATE_LIMIT_PER_KEY:-3}
      PST_CANCEL_CHECK_INTERVAL: ${PST_CANCEL_CHECK_INTERVAL:-10}
      PST_ZIP_BLOCK_SIZE: ${PST_ZIP_BLOCK_SIZE:-4194304}
      PST_METRICS_PORT: ${PST_METRICS_PORT:-9100}
    depends_on:
      rabbitmq:
        condition: service_healthy
      postgres:
        condition: service_healthy
    deploy:
      # Production sizing for 250 TiB / 5K-user workloads:
      #   replicas: 4   (override via RESTORE_HEAVY_REPLICAS)
      #   memory:   32 GiB — headroom for in-flight pst_convert chunks +
      #                       attachment payloads on whale-mailbox PST
      #                       exports (100GB+).
      # MAX_CONCURRENT_EXPORTS_PER_WORKER=1 so each replica processes one
      # whale at a time; 4 replicas = 4 simultaneous whale exports.
      replicas: ${RESTORE_HEAVY_REPLICAS:-1}
      resources:
        limits:
          memory: ${RESTORE_HEAVY_MEM_LIMIT:-32G}
          cpus: "${RESTORE_HEAVY_CPU_LIMIT:-8}"
        reservations:
          memory: ${RESTORE_HEAVY_MEM_RESERVE:-8G}
    mem_limit: ${RESTORE_HEAVY_MEM_LIMIT:-32g}
    restart: unless-stopped
    networks:
      - tm-network

  # search-service removed — see note above graph-proxy/delta-token. Gateway
  # routes /resources/search to resource-service; this service had no callers.

  # ===== Azure Workload Worker (AZ-1/2/3) =====

  azure-workload-worker:
    build:
      context: .
      dockerfile: workers/azure-workload-worker/Dockerfile
    container_name: tm_vault_azure_workload
    env_file: .env
    environment:
      PYTHONUNBUFFERED: "1"
      DB_HOST: postgres
      RABBITMQ_ENABLED: "true"
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USER: ${RABBITMQ_USER:?RABBITMQ_USER must be set — do not fall back to the default guest account}
      RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD:?RABBITMQ_PASSWORD must be set — do not fall back to the default guest account}
      AZURE_STORAGE_ACCOUNT_NAME: ${AZURE_STORAGE_ACCOUNT_NAME}
      AZURE_STORAGE_ACCOUNT_KEY: ${AZURE_STORAGE_ACCOUNT_KEY}
      # Azure ARM credentials for VM/SQL/PostgreSQL backup
      AZURE_ARM_CLIENT_ID: ${AZURE_ARM_CLIENT_ID:-}
      AZURE_ARM_CLIENT_SECRET: ${AZURE_ARM_CLIENT_SECRET:-}
      AZURE_ARM_TENANT_ID: ${AZURE_ARM_TENANT_ID:-}
      # Fallback to Graph app credentials if ARM-specific not set
      APP_1_CLIENT_ID: ${APP_1_CLIENT_ID}
      APP_1_CLIENT_SECRET: ${APP_1_CLIENT_SECRET}
      APP_1_TENANT_ID: ${APP_1_TENANT_ID}
      # Backup resource group
      AZURE_BACKUP_RESOURCE_GROUP: ${AZURE_BACKUP_RESOURCE_GROUP:-tmvault-backup}
      AZURE_BACKUP_REGION: ${AZURE_BACKUP_REGION:-eastus}
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - tm-network
    deploy:
      replicas: ${AZURE_WORKER_REPLICAS:-1}

  # ===== DR Replication Worker (AZ-4) =====

  dr-replication-worker:
    build:
      context: .
      dockerfile: services/dr-replication-worker/Dockerfile
    container_name: tm_vault_dr_replication
    env_file: .env
    environment:
      PYTHONUNBUFFERED: "1"
      DB_HOST: postgres
      AZURE_STORAGE_ACCOUNT_NAME: ${AZURE_STORAGE_ACCOUNT_NAME}
      AZURE_STORAGE_ACCOUNT_KEY: ${AZURE_STORAGE_ACCOUNT_KEY}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY:-}
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - tm-network
    deploy:
      replicas: ${DR_WORKER_REPLICAS:-1}

  storage-toggle-worker:
    build:
      context: .
      dockerfile: services/storage_toggle_worker/Dockerfile
    container_name: tm_vault_storage_toggle
    env_file: .env
    environment:
      PYTHONUNBUFFERED: "1"
      DB_HOST: postgres
      RABBITMQ_HOST: rabbitmq
      AZURE_STORAGE_ACCOUNT_NAME: ${AZURE_STORAGE_ACCOUNT_NAME}
      AZURE_STORAGE_ACCOUNT_KEY: ${AZURE_STORAGE_ACCOUNT_KEY}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY:-}
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - tm-network

  # ---------------------------------------------------------------------------
  # Observability — Prometheus + Grafana (gated by 'observability' profile)
  # Bring up with: docker compose --profile observability up -d
  # Scrapes metrics on the worker pods at :9100/metrics. Grafana on :3001.
  # ---------------------------------------------------------------------------
  prometheus:
    image: prom/prometheus:latest
    container_name: tm_vault_prometheus
    profiles: ["observability"]
    volumes:
      - ./ops/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.retention.time=30d"
      - "--storage.tsdb.path=/prometheus"
    ports:
      - "9090:9090"
    restart: unless-stopped
    networks:
      - tm-network

  grafana:
    image: grafana/grafana:latest
    container_name: tm_vault_grafana
    profiles: ["observability"]
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-admin}
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./ops/grafana-datasources.yml:/etc/grafana/provisioning/datasources/datasources.yml:ro
    ports:
      - "3001:3000"
    depends_on:
      - prometheus
    restart: unless-stopped
    networks:
      - tm-network

  # ---------------------------------------------------------------------------
  # Postgres read-replica (gated by 'ha' profile). For true production HA
  # use a managed service (Azure Database for PostgreSQL Flexible Server,
  # AWS RDS, Cloud SQL) — this compose service is for dev-validating the
  # app-side failover behaviour, not for production-grade replication.
  # ---------------------------------------------------------------------------
  postgres-replica:
    image: postgres:16
    container_name: tm_vault_db_replica
    profiles: ["ha"]
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      PGUSER: replicator
    command: >
      bash -c "
        until pg_basebackup --pgdata=/var/lib/postgresql/data -R --slot=replica_slot --host=postgres --port=5432; do
          echo 'Waiting for primary to be ready...'; sleep 5;
        done
        echo 'standby_mode = on' >> /var/lib/postgresql/data/postgresql.conf
        chown -R postgres:postgres /var/lib/postgresql/data
        exec postgres
      "
    volumes:
      - postgres_replica_data:/var/lib/postgresql/data
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - tm-network

  # ---------------------------------------------------------------------------
  # Redis Sentinel (gated by 'ha' profile). For production: managed Redis
  # (Azure Cache for Redis Premium, ElastiCache) or a self-hosted Sentinel
  # cluster. This single-Sentinel setup validates app-side failover.
  # ---------------------------------------------------------------------------
  redis-sentinel:
    image: bitnami/redis-sentinel:latest
    container_name: tm_vault_redis_sentinel
    profiles: ["ha"]
    environment:
      REDIS_MASTER_HOST: redis
      REDIS_MASTER_SET: tmvault-master
      REDIS_SENTINEL_QUORUM: "1"
      REDIS_SENTINEL_DOWN_AFTER_MILLISECONDS: "10000"
      REDIS_SENTINEL_FAILOVER_TIMEOUT: "30000"
    ports:
      - "26379:26379"
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - tm-network

volumes:
  postgres_data:
  postgres_replica_data:
  redis_data:
  azurite_data:
  prometheus_data:
  grafana_data:

networks:
  tm-network:
    driver: bridge
