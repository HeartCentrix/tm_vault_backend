; PgBouncer config for TMvault.
;
; Designed to front the Railway-managed Postgres (POSTGRESQL_HOST in
; env). Transaction-pool mode is the only one safe for the app's
; SQLAlchemy + asyncpg pattern — session-pool would hold a backend
; connection for the entire app request, which defeats the point.
;
; Caveats for transaction-pool:
;   * No session-level features: SET LOCAL, server-side cursors,
;     advisory locks held across statements, prepared statements
;     (we already disable asyncpg's prepared cache via
;     statement_cache_size=0, see shared/database.py).
;   * Migrations should bypass PgBouncer and go straight to PG
;     (alembic env.py reads DATABASE_URL_DIRECT when set).

[databases]
* = host=$POSTGRESQL_HOST port=$POSTGRESQL_PORT auth_user=$POSTGRESQL_USERNAME

[pgbouncer]
listen_addr = 0.0.0.0
listen_port = $PGBOUNCER_LISTEN_PORT

; ─── Auth ─────────────────────────────────────────────────────────
auth_type = $PGBOUNCER_AUTH_TYPE
auth_file = /opt/bitnami/pgbouncer/conf/userlist.txt
; Look up password via SCRAM against the backend; works with managed PG.
auth_query = SELECT usename, passwd FROM pg_shadow WHERE usename=$1

; ─── Pooling ──────────────────────────────────────────────────────
pool_mode = $PGBOUNCER_POOL_MODE
max_client_conn = $PGBOUNCER_MAX_CLIENT_CONN
default_pool_size = $PGBOUNCER_DEFAULT_POOL_SIZE
reserve_pool_size = $PGBOUNCER_RESERVE_POOL_SIZE
reserve_pool_timeout = $PGBOUNCER_RESERVE_POOL_TIMEOUT
query_wait_timeout = $PGBOUNCER_QUERY_WAIT_TIMEOUT
server_idle_timeout = $PGBOUNCER_SERVER_IDLE_TIMEOUT
server_lifetime = $PGBOUNCER_SERVER_LIFETIME

; ─── Logging ─────────────────────────────────────────────────────
; Slow-query log is invaluable at scale.
log_connections = 0
log_disconnections = 0
log_pooler_errors = 1
stats_period = 60

; Use stderr so Railway streams logs.
syslog = 0

; Disable the welcome ServerSettings shim so asyncpg's search_path
; setting is honored on the *backend* connection rather than being
; trapped at the pooler. Keeps `search_path=tm_vault,public` working.
ignore_startup_parameters = extra_float_digits,application_name,search_path

; Admin console — only reachable from inside the container; expose
; only if you really need to run SHOW POOLS etc.
admin_users = pgbouncer
stats_users = pgbouncer
